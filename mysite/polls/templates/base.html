{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Anketix</title>
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --red: #ff4d4d; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Navbar Düzenlemesi */
        nav { 
            background: #000; 
            padding: 15px 10%; 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 2px solid var(--red); 
            align-items: center; 
        }

        .btn { 
            background: var(--red); 
            color: white; 
            padding: 8px 20px; 
            border-radius: 4px; 
            text-decoration: none; 
            font-weight: bold; 
            border: none; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .btn:hover { background: #cc0000; box-shadow: 0 0 10px rgba(255, 77, 77, 0.4); }

        .container { padding: 40px 10%; }
        .card { background: var(--card); padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; }
        
        form.logout-form { display: inline; margin-left: 10px; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}" style="display: flex; align-items: center; text-decoration: none; gap: 12px;">
            <img src="{% static 'polls/images/logo.png' %}" alt="Anketix Logo" style="height: 40px; width: auto; border-radius: 4px;">
            <span style="color: var(--red); font-size: 26px; font-weight: 900; letter-spacing: 2px;">ANKETİX</span>
        </a>
        
        <div>
            {% if user.is_authenticated %}
                <span style="margin-right:15px; color: #ccc;">👤 {{ user.username }}</span>
                <a href="{% url 'create_poll' %}" class="btn">Anket Oluştur</a>
                <form action="{% url 'logout' %}" method="post" class="logout-form">
                    {% csrf_token %}
                    <button type="submit" style="background:none; border:none; color:#888; cursor:pointer; font-size: 0.9em;">Çıkış Yap</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" style="color:#fff; text-decoration:none; margin-right:15px; font-weight: bold;">Giriş Yap</a>
                <a href="{% url 'signup' %}" class="btn">Kayıt Ol</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
